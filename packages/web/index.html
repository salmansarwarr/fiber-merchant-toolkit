<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiber Merchant Toolkit</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; color: #0f172a; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tab-btn { padding: 0.5rem 1rem; border: 1px solid #cbd5e1; background: #f8fafc; cursor: pointer; }
    .tab-btn.active { background: #0f172a; color: #fff; }
    .panel { display: none; }
    .panel.active { display: block; }
    .hidden { display: none !important; }
    label { display: block; margin-top: 0.75rem; font-size: 0.85rem; }
    input { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; }
    button[type="submit"] { margin-top: 1rem; padding: 0.5rem 1rem; }
    .status-msg { margin-top: 0.75rem; font-size: 0.9rem; }
    .status-error { color: #dc2626; }
    .status-success { color: #16a34a; }
    .status-info { color: #2563eb; }

    .result-card, .poll-section {
      margin-top: 1rem;
      padding: 1.25rem;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #fff;
    }
    .result-card h3 { margin: 0 0 1rem; font-size: 1rem; }

    .result-qr {
      display: flex;
      justify-content: center;
      padding: 0.75rem;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      margin-bottom: 1rem;
    }

    .result-fields { display: flex; flex-direction: column; gap: 0.6rem; }
    .result-field label {
      margin: 0 0 0.25rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #64748b;
    }
    .result-value {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .result-value code {
      flex: 1;
      display: block;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.4;
      word-break: break-all;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 0.5rem 0.6rem;
    }
    .result-value.plain code {
      background: none;
      border: none;
      padding: 0;
      word-break: normal;
      font-size: 0.9rem;
    }
    .copy-btn {
      flex-shrink: 0;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      border-radius: 6px;
      padding: 0.4rem 0.6rem;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .copy-btn:hover { background: #e2e8f0; }

    .poll-section p { margin: 0.35rem 0; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Fiber Merchant Toolkit</h1>

  <div class="tabs">
    <button id="tab-invoice" class="tab-btn active" type="button">Create Invoice</button>
    <button id="tab-export" class="tab-btn" type="button">Export CSV</button>
  </div>

  <div id="panel-invoice" class="panel active">
    <form id="invoice-form">
      <label for="inv-amount">Amount (RUSD)</label>
      <input type="text" id="inv-amount" name="amount" required />

      <label for="inv-description">Description (optional)</label>
      <input type="text" id="inv-description" name="description" />

      <button id="inv-submit" type="submit">Create Invoice</button>
    </form>
    <p id="inv-status" class="status-msg"></p>

    <div id="inv-result" class="result-card hidden">
      <h3>Invoice Created</h3>

      <div class="result-fields">
        <div class="result-field">
          <label>Invoice Address</label>
          <div class="result-value">
            <code id="res-address"></code>
            <button type="button" class="copy-btn" data-copy-target="res-address">Copy</button>
          </div>
        </div>
        <div class="result-field">
          <label>Payment Hash</label>
          <div class="result-value">
            <code id="res-hash"></code>
            <button type="button" class="copy-btn" data-copy-target="res-hash">Copy</button>
          </div>
        </div>
        <div class="result-field">
          <label>Amount</label>
          <div class="result-value plain"><code id="res-amount"></code></div>
        </div>
        <div class="result-field">
          <label>Expires</label>
          <div class="result-value plain"><code id="res-expires"></code></div>
        </div>
      </div>
    </div>

    <div id="poll-section" class="poll-section hidden">
      <p>Payment Hash: <span id="poll-hash"></span></p>
      <p id="poll-status" class="status-msg"></p>
      <a id="poll-download" class="hidden" href="#">Download Receipt PDF</a>
    </div>
  </div>

  <div id="panel-export" class="panel">
    <form id="export-form">
      <label for="exp-from">From</label>
      <input type="date" id="exp-from" name="from" required />

      <label for="exp-to">To</label>
      <input type="date" id="exp-to" name="to" required />

      <button id="exp-submit" type="submit">Export CSV</button>
    </form>
    <p id="exp-status" class="status-msg"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
